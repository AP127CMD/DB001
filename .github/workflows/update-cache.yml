name: Update cache.json

on:
  schedule:
    - cron: '0 * * * *'  # hourly fallback (CF Worker dispatcher fires every 5 min)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

concurrency:
  group: "update-cache"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch data and rebuild cache.json
        run: node update-cache.js
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}

      - name: Sync AP127 Detail from index.html into student.html
        run: node build-student.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json student.html
          if git diff --cached --quiet; then
            echo "No changes to cache.json or student.html"
          else
            git commit -m "chore: update cache.json [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            # Push with retry. On a non-fast-forward rejection, replay our commit
            # on top of the new remote tip, keeping OUR freshly regenerated files
            # (`-X theirs` auto-resolves the conflict on cache.json/student.html).
            for attempt in 1 2 3 4 5; do
              if git push origin main; then
                echo "Pushed on attempt $attempt"; break
              fi
              if [ "$attempt" = 5 ]; then
                echo "::error::push failed after 5 attempts"; exit 1
              fi
              echo "Push rejected — syncing with remote (attempt $attempt)…"
              git fetch origin main
              git rebase -X theirs origin/main || { git rebase --abort; exit 1; }
              sleep $((attempt * 3))
            done
          fi

      - name: Push AP127 slice to Cloudflare KV
        run: node push-to-kv.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Push student.html to AP127_DashboardR1
        if: github.ref == 'refs/heads/main'
        run: node sync-dashboardr1.js
        env:
          GH_PAT_DASHBOARDR1: ${{ secrets.GH_PAT_DASHBOARDR1 }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}

      # Open a GitHub issue when any step above fails so a red run doesn't sit
      # unnoticed for days (as happened 2026-07-03→08 with an expired PAT).
      - name: Report failure as GitHub issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Update cache] Run failed – ${new Date().toISOString().slice(0,16)} UTC`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'update-cache-failure',
            });
            if (open.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title,
                body: [
                  `Workflow run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  'Check which step failed before assuming the RELAY_URL fetch is the problem — it usually',
                  "isn't. A stale GH_PAT_DASHBOARDR1/GH_PAT_DISPATCHER/CF_API_TOKEN is a more common cause;",
                  'see AP127_Docs README §10 for prior incidents.',
                  '',
                  'Re-run manually from the Actions tab once fixed.',
                ].join('\n'),
                labels: ['update-cache-failure'],
              });
            }

