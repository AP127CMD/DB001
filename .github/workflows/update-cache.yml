name: Update cache.json

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes (minimum GitHub allows)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch data and rebuild cache.json
        run: node update-cache.js
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          if git diff --cached --quiet; then
            echo "No changes to cache.json"
          else
            git commit -m "chore: update cache.json [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Push AP127 slice to Cloudflare KV
        run: node push-to-kv.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Inject secrets into index.html and student.html
        run: |
          sed -i "s|__ADMIN_HASH__|${{ secrets.ADMIN_PASSWORD_HASH }}|g" index.html
          sed -i "s|__RELAY_URL__|${{ secrets.RELAY_URL }}|g" index.html
          sed -i "s|__WORKER_URL__|${{ secrets.CF_WORKER_URL }}|g" student.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
