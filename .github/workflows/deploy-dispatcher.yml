name: Deploy Dispatcher Worker

on:
  push:
    branches: [main]
    paths:
      - 'dispatcher/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@4

      # Deploy the worker script itself.
      - name: Deploy Worker
        working-directory: dispatcher
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # Upload the GitHub PAT as a Worker secret so the Worker can call
      # workflow_dispatch. This requires CF_API_TOKEN to have Workers Scripts:Edit
      # permission. If this step fails, set GITHUB_PAT manually once via:
      #   Cloudflare Dashboard → Workers → ap127-dispatcher → Settings → Variables
      - name: Upload GITHUB_PAT secret
        working-directory: dispatcher
        continue-on-error: true
        run: echo "$GH_PAT" | wrangler secret put GITHUB_PAT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_PAT: ${{ secrets.GH_PAT_DASHBOARDR1 }}
