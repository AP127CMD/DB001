name: Deploy Dispatcher Worker

on:
  push:
    branches: [main]
    paths:
      - 'dispatcher/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@4

      # CF_WORKERS_TOKEN must have: Workers Scripts:Edit + Account:Read
      # Create at: https://dash.cloudflare.com/profile/api-tokens
      # Use the "Edit Cloudflare Workers" template — it includes all needed scopes.
      - name: Deploy Worker
        working-directory: dispatcher
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Upload GITHUB_PAT secret
        working-directory: dispatcher
        run: echo "$GH_PAT" | wrangler secret put GITHUB_PAT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_PAT: ${{ secrets.GH_PAT_DASHBOARDR1 }}
